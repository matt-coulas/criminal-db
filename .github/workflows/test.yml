name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[dev,tui]"

      - name: Run tests
        run: pytest -q

      - name: Ruff (new modules)
        run: |
          ruff check criminal_db/db/migrations.py criminal_db/verify.py \
            criminal_db/search_unified.py criminal_db/server.py criminal_db/ops/ \
            criminal_db/api.py tests/test_verify.py tests/test_backup.py \
            tests/test_search_scope.py
